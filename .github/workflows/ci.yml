name: CI
on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches-ignore:
      - gh-pages

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup tools
      - name: Run RoKit
        uses: CompeyDev/setup-rokit@v0.1.2

      # Run Selene
      - name: Update standard library
        run: selene update-roblox-std
      - name: Run Selene
        run: selene ./Cmdr

      # Run Stylua
      - name: Validate Stylua
        run: stylua -c ./Cmdr
